name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BRAIN_SYNC_SECRET: ${{ secrets.BRAIN_SYNC_SECRET }}
          BRAIN_ACCESS_PASSWORD: ${{ secrets.BRAIN_ACCESS_PASSWORD }}
          BRAIN_SESSION_SECRET: ${{ secrets.BRAIN_SESSION_SECRET }}
