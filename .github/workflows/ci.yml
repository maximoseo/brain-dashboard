name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npm run typecheck

      - name: Unit and contract tests
        run: npm test

      - name: English-only UI check
        run: npm run check:english

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_KEY: ci-placeholder-service-role-key
          BRAIN_ACCESS_PASSWORD: ci-placeholder-access-password
          BRAIN_SESSION_SECRET: ci-placeholder-session-secret-at-least-32-characters
          BRAIN_API_READ_KEY: ci-placeholder-read-key-at-least-32-characters
          BRAIN_SYNC_WRITE_KEY: ci-placeholder-sync-key-at-least-32-characters
          BRAIN_MEMORY_WRITE_KEY: ci-placeholder-memory-key-at-least-32-characters
