name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BRAIN_ACCESS_PASSWORD: ${{ secrets.BRAIN_ACCESS_PASSWORD }}
          BRAIN_SESSION_SECRET: ${{ secrets.BRAIN_SESSION_SECRET }}
          BRAIN_API_READ_KEY: ${{ secrets.BRAIN_API_READ_KEY }}
          BRAIN_SYNC_WRITE_KEY: ${{ secrets.BRAIN_SYNC_WRITE_KEY }}
          BRAIN_MEMORY_WRITE_KEY: ${{ secrets.BRAIN_MEMORY_WRITE_KEY }}
